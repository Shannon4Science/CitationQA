---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cqa
  namespace: shannon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cqa
  template:
    metadata:
      labels:
        app: cqa
    spec:
      containers:
        - name: cqa
          image: docker.shlab.tech/public/cqa:main-42719
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: BASE_PATH
              value: "/cqa"
