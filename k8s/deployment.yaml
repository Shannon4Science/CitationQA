---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cqa
  namespace: shannon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cqa
  template:
    metadata:
      labels:
        app: cqa
    spec:
      containers:
        - name: cqa
          image: docker.shlab.tech/public/cqa:main-42728
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: BASE_PATH
              value: "/cqa"
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: cqa-secret
                  key: LLM_MODEL
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cqa-secret
                  key: LLM_API_KEY
            - name: LLM_PRIMARY_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: cqa-secret
                  key: LLM_PRIMARY_BASE_URL
            - name: LLM_SECONDARY_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: cqa-secret
                  key: LLM_SECONDARY_BASE_URL
            - name: SERPAPI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cqa-secret
                  key: SERPAPI_API_KEY
            - name: MINERU_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cqa-secret
                  key: MINERU_API_TOKEN
